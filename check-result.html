<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Exam Results | Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 900: '#0c4a6e' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; }
        
        /* Hidden container for PDF rendering */
        #pdf-container { position: absolute; left: -9999px; top: -9999px; width: 800px; background: white; z-index: -1; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col relative overflow-x-hidden">

    <header class="glass-header sticky top-0 z-30 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-brand-600 text-white rounded-xl flex items-center justify-center text-lg shadow-lg">
                <i class="fas fa-user-graduate"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-800 leading-tight">Student Portal</h1>
                <p class="text-xs text-slate-500 font-medium uppercase">Exam Results</p>
            </div>
        </div>
        <button onclick="window.location.reload()" class="bg-slate-100 hover:bg-brand-50 text-slate-600 px-4 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-2">
            <i class="fas fa-home"></i> <span>Home</span>
        </button>
    </header>

    <main class="flex-1 w-full max-w-5xl mx-auto p-4 sm:p-8 flex flex-col justify-center">
        
        <div id="view-login" class="w-full max-w-md mx-auto fade-in">
            <div class="text-center mb-8 slide-up">
                <h1 class="text-3xl font-extrabold text-slate-800 mb-2">Find My Results</h1>
                <p class="text-slate-500">Access your secure exam history.</p>
            </div>

            <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-xl slide-up">
                <div id="login-error" class="hidden mb-5 p-4 bg-rose-50 text-rose-600 text-sm font-medium rounded-xl border border-rose-100"></div>

                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1.5">Full Name</label>
                        <input type="text" id="inp-name" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none transition-all" placeholder="Enter Name">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1.5">Mobile Number</label>
                        <input type="tel" id="inp-mobile" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none transition-all" placeholder="Enter Mobile">
                    </div>
                    <button id="btn-verify" onclick="app.verifyStudent()" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex justify-center items-center">
                        <span id="btn-text">Check My Results</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="view-results" class="hidden fade-in w-full">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-8 slide-up gap-4">
                <div>
                    <h2 class="text-3xl font-black text-slate-800">Hello, <span id="display-name" class="text-brand-600 uppercase"></span>!</h2>
                    <p class="text-slate-500 font-medium">Your assessment history is shown below.</p>
                </div>
                <button onclick="app.logout()" class="text-sm font-bold text-brand-600 bg-brand-50 px-4 py-2 rounded-lg hover:bg-brand-100 transition">
                    <i class="fas fa-search mr-1"></i> New Search
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                    <div class="w-12 h-12 bg-brand-50 text-brand-600 rounded-full flex items-center justify-center text-xl font-black">#</div>
                    <div><p class="text-slate-500 text-xs font-bold uppercase">Attempts</p><p class="text-2xl font-black" id="stat-attempts">0</p></div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                    <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center text-xl"><i class="fas fa-trophy"></i></div>
                    <div><p class="text-slate-500 text-xs font-bold uppercase">Best Score</p><p class="text-2xl font-black text-emerald-600" id="stat-best">0%</p></div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                    <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-full flex items-center justify-center text-xl"><i class="fas fa-chart-line"></i></div>
                    <div><p class="text-slate-500 text-xs font-bold uppercase">Average</p><p class="text-2xl font-black text-amber-600" id="stat-avg">0%</p></div>
                </div>
            </div>

            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden slide-up">
                <div class="p-5 border-b border-slate-100 font-bold text-slate-800 flex justify-between items-center flex-wrap gap-3">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-history text-brand-600"></i> Submission History
                    </div>
                    <button id="btn-dl-all" onclick="app.downloadAll()" class="text-xs bg-slate-800 hover:bg-slate-700 text-white px-3 py-1.5 rounded-lg font-bold transition shadow-sm flex items-center gap-2">
                        <i class="fas fa-download"></i> Download All Reports
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-slate-500 font-bold uppercase text-[10px] tracking-widest">
                            <tr>
                                <th class="px-6 py-4">Attempt Date & Time</th>
                                <th class="px-6 py-4 text-center">Score</th>
                                <th class="px-6 py-4 text-center">Correct</th>
                                <th class="px-6 py-4">Time Taken</th>
                                <th class="px-6 py-4 text-center">Scorecard</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-slate-100 font-medium"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="pdf-container"></div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnIWzqRx6avGPXrlpcw-GwhGDJoq7FPnrq69i2Xevh-m4SqAOTTqa0LXzukjSnSuRugg/exec';

        const app = {
            allScores: [],
            currentResults: [],

            async verifyStudent() {
                const name = document.getElementById('inp-name').value.trim();
                const mobile = document.getElementById('inp-mobile').value.trim();
                const btnText = document.getElementById('btn-text');
                const btn = document.getElementById('btn-verify');

                if (!name || !mobile) {
                    this.showError("Please fill in all fields.");
                    return;
                }

                btn.disabled = true;
                btnText.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Connecting...';

                try {
                    const response = await fetch(SCRIPT_URL);
                    const data = await response.json();
                    this.allScores = data.examScores || [];

                    const myResults = this.allScores.filter(s => String(s.Mobile).trim() === mobile);

                    if (myResults.length === 0) {
                        this.showError("No record found for this mobile number.");
                        btn.disabled = false;
                        btnText.innerText = 'Check My Results';
                        return;
                    }

                    myResults.sort((a, b) => new Date(b.Timestamp) - new Date(a.Timestamp));
                    this.currentResults = myResults; // Save for PDF generation
                    this.renderResults(myResults, name);
                } catch (e) {
                    this.showError("Database connection failed. Check your internet.");
                    btn.disabled = false;
                    btnText.innerText = 'Check My Results';
                }
            },

            renderResults(results, studentName) {
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-results').classList.remove('hidden');
                document.getElementById('display-name').innerText = studentName;

                let scores = results.map(r => {
                    let s = String(r.Score).trim();
                    if (s.endsWith('%')) return parseFloat(s.replace('%', ''));
                    let f = parseFloat(s);
                    if (isNaN(f)) return 0;
                    return (f <= 1 && s !== "0") ? f * 100 : f; 
                });
                
                let max = scores.length > 0 ? Math.max(...scores) : 0;
                let avg = scores.length > 0 ? (scores.reduce((a,b) => a+b, 0) / scores.length).toFixed(1) : 0;

                document.getElementById('stat-attempts').innerText = results.length;
                document.getElementById('stat-best').innerText = max + '%';
                document.getElementById('stat-avg').innerText = avg + '%';

                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '';

                results.forEach((score, index) => {
                    const dateObj = new Date(score.Timestamp);
                    const dateStr = !isNaN(dateObj) ? 
                        `<span class="text-slate-800 font-bold">${dateObj.toLocaleDateString()}</span> <span class="ml-2 text-slate-400 bg-slate-100 px-2 py-1 rounded text-xs">${dateObj.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>` : 
                        score.Timestamp;

                    let numScore = scores[index];
                    let displayScore = numScore + '%'; 
                    const badgeColor = numScore >= 80 ? 'bg-emerald-100 text-emerald-700' : (numScore >= 50 ? 'bg-amber-100 text-amber-700' : 'bg-rose-100 text-rose-700');

                    let displayCorrect = score.Correct || score.correctAnswers || "N/A";
                    let strCorrect = String(displayCorrect).trim();
                    
                    if (strCorrect.match(/^\d{4}-\d{2}-\d{2}T/)) {
                        let d = new Date(strCorrect);
                        if (!isNaN(d.getTime())) {
                            displayCorrect = d.getDate() + "/" + (d.getMonth() + 1);
                        }
                    }

                    tbody.insertAdjacentHTML('beforeend', `
                        <tr class="hover:bg-slate-50 transition-colors group">
                            <td class="px-6 py-5">${dateStr}</td>
                            <td class="px-6 py-5 text-center"><span class="${badgeColor} px-3 py-1.5 rounded-lg font-black text-sm border border-black/5">${displayScore}</span></td>
                            <td class="px-6 py-5 text-center font-bold text-slate-700">${displayCorrect}</td>
                            <td class="px-6 py-5 text-slate-500 font-bold"><i class="far fa-clock mr-1 text-slate-300"></i> ${score.TimeTaken || "N/A"}</td>
                            <td class="px-6 py-5 text-center">
                                <button onclick="app.downloadSingle(${index})" id="btn-dl-${index}" class="text-brand-600 hover:text-white bg-brand-50 hover:bg-brand-600 px-3 py-1.5 rounded transition shadow-sm border border-brand-100 font-bold text-xs" title="Download Scorecard">
                                    <i class="fas fa-file-pdf mr-1"></i> PDF
                                </button>
                            </td>
                        </tr>
                    `);
                });
            },

            // --- PDF GENERATION LOGIC ---
            
            formatDateCorrectly(isoString) {
                const d = new Date(isoString);
                return isNaN(d.getTime()) ? isoString : d.toLocaleString();
            },

            formatFraction(val) {
                let s = String(val).trim();
                if (s.match(/^\d{4}-\d{2}-\d{2}T/)) {
                    let d = new Date(s);
                    if (!isNaN(d.getTime())) return d.getDate() + "/" + (d.getMonth() + 1);
                }
                return s;
            },

            formatPercentage(val) {
                let s = String(val).trim();
                if (s.endsWith('%')) return s;
                let f = parseFloat(s);
                if (isNaN(f)) return '0%';
                return (f <= 1 && s !== "0") ? (f * 100) + '%' : f + '%'; 
            },

            downloadSingle(index) {
                const btn = document.getElementById(`btn-dl-${index}`);
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                
                const score = this.currentResults[index];
                const name = document.getElementById('display-name').innerText;
                const mobile = document.getElementById('inp-mobile').value.trim();
                
                const html = `
                    <div id="pdf-content" style="padding: 40px 50px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #1e293b; background: white;">
                        <div style="text-align: center; border-bottom: 3px solid #0ea5e9; padding-bottom: 20px; margin-bottom: 30px;">
                            <h1 style="color: #0284c7; margin: 0; font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">Official Scorecard</h1>
                            <p style="color: #64748b; margin: 5px 0 0 0; font-size: 14px;">Gyanbit Assessment Portal</p>
                        </div>
                        
                        <table style="width: 100%; border-collapse: collapse; margin-bottom: 40px;">
                            <tr>
                                <td style="padding: 10px 0; color: #64748b; font-weight: bold; width: 30%;">Student Name:</td>
                                <td style="padding: 10px 0; font-size: 18px; font-weight: bold; color: #0f172a;">${name}</td>
                            </tr>
                            <tr>
                                <td style="padding: 10px 0; color: #64748b; font-weight: bold;">Mobile Number:</td>
                                <td style="padding: 10px 0; font-weight: bold;">${mobile}</td>
                            </tr>
                            <tr>
                                <td style="padding: 10px 0; color: #64748b; font-weight: bold;">Attempt Date:</td>
                                <td style="padding: 10px 0; font-weight: bold;">${this.formatDateCorrectly(score.Timestamp)}</td>
                            </tr>
                        </table>
                        
                        <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                            <thead>
                                <tr style="background-color: #f1f5f9;">
                                    <th style="padding: 15px; border: 1px solid #cbd5e1; text-align: left; color: #475569;">Assessment Metric</th>
                                    <th style="padding: 15px; border: 1px solid #cbd5e1; text-align: right; color: #475569;">Result Achieved</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td style="padding: 15px; border: 1px solid #cbd5e1; font-weight: bold;">Final Score</td>
                                    <td style="padding: 15px; border: 1px solid #cbd5e1; text-align: right; font-weight: 900; font-size: 20px; color: #0ea5e9;">${this.formatPercentage(score.Score)}</td>
                                </tr>
                                <tr>
                                    <td style="padding: 15px; border: 1px solid #cbd5e1; font-weight: bold;">Correct Answers</td>
                                    <td style="padding: 15px; border: 1px solid #cbd5e1; text-align: right; font-weight: bold;">${this.formatFraction(score.Correct || score.correctAnswers)}</td>
                                </tr>
                                <tr>
                                    <td style="padding: 15px; border: 1px solid #cbd5e1; font-weight: bold;">Time Taken</td>
                                    <td style="padding: 15px; border: 1px solid #cbd5e1; text-align: right; font-weight: bold;">${score.TimeTaken || "N/A"}</td>
                                </tr>
                            </tbody>
                        </table>
                        
                        <div style="margin-top: 60px; text-align: center; color: #94a3b8; font-size: 12px; border-top: 1px solid #e2e8f0; padding-top: 20px;">
                            <p>This is a verified, system-generated scorecard from the Gyanbit Platform.</p>
                        </div>
                    </div>
                `;
                
                const container = document.getElementById('pdf-container');
                container.innerHTML = html;
                
                const opt = {
                    margin: 0.5,
                    filename: `${name.replace(/\s+/g, '_')}_Scorecard_${index+1}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
                };

                html2pdf().set(opt).from(document.getElementById('pdf-content')).save().then(() => {
                    btn.innerHTML = originalText;
                });
            },

            downloadAll() {
                const btn = document.getElementById('btn-dl-all');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Generating PDF...';
                btn.disabled = true;

                const name = document.getElementById('display-name').innerText;
                const mobile = document.getElementById('inp-mobile').value.trim();
                
                let rowsHtml = '';
                this.currentResults.forEach((score, index) => {
                    rowsHtml += `
                        <tr>
                            <td style="padding: 12px; border: 1px solid #cbd5e1; text-align: center;">${index + 1}</td>
                            <td style="padding: 12px; border: 1px solid #cbd5e1;">${this.formatDateCorrectly(score.Timestamp)}</td>
                            <td style="padding: 12px; border: 1px solid #cbd5e1; text-align: center; font-weight: bold; color: #0ea5e9;">${this.formatPercentage(score.Score)}</td>
                            <td style="padding: 12px; border: 1px solid #cbd5e1; text-align: center;">${this.formatFraction(score.Correct || score.correctAnswers)}</td>
                            <td style="padding: 12px; border: 1px solid #cbd5e1; text-align: center;">${score.TimeTaken || "N/A"}</td>
                        </tr>
                    `;
                });

                const html = `
                    <div id="pdf-content" style="padding: 40px 50px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #1e293b; background: white;">
                        <div style="text-align: center; border-bottom: 3px solid #0ea5e9; padding-bottom: 20px; margin-bottom: 30px;">
                            <h1 style="color: #0284c7; margin: 0; font-size: 26px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">Comprehensive Report</h1>
                            <p style="color: #64748b; margin: 5px 0 0 0; font-size: 14px;">Gyanbit Assessment Portal</p>
                        </div>
                        
                        <div style="background-color: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 30px;">
                            <p style="margin: 0 0 8px 0;"><strong>Student Name:</strong> <span style="font-size:16px;">${name}</span></p>
                            <p style="margin: 0 0 8px 0;"><strong>Mobile Number:</strong> ${mobile}</p>
                            <p style="margin: 0;"><strong>Total Exam Attempts:</strong> ${this.currentResults.length}</p>
                        </div>
                        
                        <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
                            <thead>
                                <tr style="background-color: #0f172a; color: white;">
                                    <th style="padding: 12px; border: 1px solid #cbd5e1; text-align: center;">Attempt</th>
                                    <th style="padding: 12px; border: 1px solid #cbd5e1; text-align: left;">Date & Time</th>
                                    <th style="padding: 12px; border: 1px solid #cbd5e1; text-align: center;">Score</th>
                                    <th style="padding: 12px; border: 1px solid #cbd5e1; text-align: center;">Correct</th>
                                    <th style="padding: 12px; border: 1px solid #cbd5e1; text-align: center;">Time Taken</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rowsHtml}
                            </tbody>
                        </table>
                        
                        <div style="margin-top: 60px; text-align: center; color: #94a3b8; font-size: 12px; border-top: 1px solid #e2e8f0; padding-top: 20px;">
                            <p>This is a verified, system-generated comprehensive assessment report.</p>
                        </div>
                    </div>
                `;
                
                const container = document.getElementById('pdf-container');
                container.innerHTML = html;
                
                const opt = {
                    margin: 0.5,
                    filename: `${name.replace(/\s+/g, '_')}_Complete_Report.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
                };

                html2pdf().set(opt).from(document.getElementById('pdf-content')).save().then(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                });
            },

            showError(msg) {
                const err = document.getElementById('login-error');
                err.innerText = msg;
                err.classList.remove('hidden');
            },

            logout() { window.location.reload(); }
        };
    </script>
</body>
</html>
