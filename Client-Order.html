<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        /* Status Colors */
        select { font-weight: 700; font-size: 0.75rem; text-align: center; cursor: pointer; }
        .st-SUBMIT { background: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; }
        .st-IN-PROGRESS { background: #fbe9e7; color: #d84315; border: 1px solid #ffccbc; }
        .st-PROCESSING { background: #fffde7; color: #f9a825; border: 1px solid #fff9c4; }
        .st-APPROVE { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .st-DELIVERED { background: #1b5e20; color: white; border: 1px solid #1b5e20; }
        .st-REJECT { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }

        /* Modal Transition */
        .modal { transition: opacity 0.2s ease-in-out; }
        .modal-content { transform: scale(0.95); transition: transform 0.2s; }
        .modal.active .modal-content { transform: scale(1); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-800">

    <nav class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-6 shadow-sm z-10">
        <div class="flex items-center gap-3">
            <div class="h-9 w-9 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-lg">G</div>
            <span class="text-xl font-bold text-gray-800">Admin<span class="text-blue-600">Panel</span></span>
        </div>
        <div class="relative w-72">
            <i class="fa-solid fa-search absolute left-3 top-3 text-gray-400"></i>
            <input type="text" id="adminSearch" onkeyup="filterData()" placeholder="Search clients..." 
                class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
        </div>
    </nav>

    <main class="flex-1 p-6 overflow-hidden">
        <div class="bg-white rounded-xl shadow border border-gray-200 h-full flex flex-col">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50 rounded-t-xl">
                <div class="flex items-center gap-2">
                    <h2 class="font-bold text-gray-700">Order Management</h2>
                    <span id="rowCount" class="bg-blue-100 text-blue-700 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
                <button onclick="loadData()" class="text-blue-600 hover:bg-blue-50 p-2 rounded-full transition"><i class="fa-solid fa-arrows-rotate"></i></button>
            </div>

            <div class="flex-1 overflow-auto custom-scroll p-0 relative">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 sticky top-0 z-10 border-b border-gray-200 shadow-sm">
                        <tr class="text-xs uppercase text-gray-500 font-semibold tracking-wider">
                            <th class="px-6 py-4">Client Details</th>
                            <th class="px-6 py-4">Service Info</th>
                            <th class="px-6 py-4">Contact</th>
                            <th class="px-6 py-4 text-center">Status</th>
                            <th class="px-6 py-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-100 text-sm"></tbody>
                </table>
                <div id="loader" class="absolute inset-0 bg-white/80 flex justify-center items-center z-20"><i class="fa-solid fa-circle-notch fa-spin text-3xl text-blue-600"></i></div>
            </div>
        </div>
    </main>

    <div id="editModal" class="modal fixed inset-0 z-50 hidden bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="modal-content bg-white w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h2 class="text-lg font-bold text-gray-800">Edit Order Details</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <form id="editForm" onsubmit="saveEdit(event)" class="p-6 overflow-y-auto custom-scroll">
                <input type="hidden" id="editRowIndex">
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Name</label>
                        <input type="text" id="editName" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Business Name</label>
                        <input type="text" id="editBiz" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Email</label>
                        <input type="email" id="editEmail" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Mobile</label>
                        <input type="text" id="editMobile" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Service Type</label>
                        <input type="text" id="editType" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Start Date</label>
                        <input type="date" id="editDate" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Requirement / Details</label>
                    <textarea id="editReq" rows="3" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>

                <input type="hidden" id="editUrl"><input type="hidden" id="editGender">

                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">Cancel</button>
                    <button type="submit" id="btnSave" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow font-medium">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============================================
        // 🔴 PASTE YOUR WEB APP URL HERE
        // ============================================
        const API_URL = "https://script.google.com/macros/s/AKfycbzl9pk4RWM-5sVJ64kZ3q7TDG7D4S8qu0XsKU6RuRRowv_VWER3UNk7J2eOj7wGfJ8UCg/exec"; 

        const PRIORITY = { "SUBMIT": 1, "IN PROGRESS": 2, "PROCESSING": 3, "APPROVE": 4, "DELIVERED": 5, "REJECT": 6 };
        let allData = [];

        // 1. Load Data
        async function loadData() {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                if (data.error) throw new Error(data.message);
                data.sort((a, b) => (PRIORITY[a.status] || 99) - (PRIORITY[b.status] || 99));

                allData = data;
                document.getElementById('rowCount').innerText = data.length;
                renderTable(data);
            } catch (err) {
                Swal.fire("Error", "Check Web App URL", "error");
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }

        // 2. Render Table
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50/40 transition-colors bg-white border-b border-gray-50";
                const stClass = `st-${(row.status || 'SUBMIT').replace(/ /g, '-')}`;

                tr.innerHTML = `
                    <td class="px-6 py-4 align-top">
                        <div class="font-bold text-gray-900">${row.name}</div>
                        <div class="text-xs text-gray-500 font-medium">${row.business}</div>
                    </td>
                    <td class="px-6 py-4 align-top">
                        <span class="bg-gray-100 text-gray-700 px-2 py-0.5 rounded text-xs border border-gray-200 font-semibold">${row.type}</span>
                        <div class="text-xs text-gray-500 mt-1 max-w-[200px] truncate">${row.req}</div>
                    </td>
                    <td class="px-6 py-4 align-top text-xs space-y-1">
                        <div class="flex items-center gap-2"><i class="fa-solid fa-phone w-4 text-gray-400"></i> ${row.mobile}</div>
                        <div class="flex items-center gap-2 text-blue-600"><i class="fa-solid fa-envelope w-4 text-blue-300"></i> ${row.email}</div>
                    </td>
                    <td class="px-6 py-4 align-middle text-center">
                        <select onchange="updateStatus(${row.rowIndex}, this)" class="${stClass} appearance-none py-1.5 px-3 rounded-full shadow-sm outline-none transition-all hover:opacity-90 w-32">
                            <option value="SUBMIT" ${row.status==='SUBMIT'?'selected':''}>SUBMIT</option>
                            <option value="IN PROGRESS" ${row.status==='IN PROGRESS'?'selected':''}>IN PROGRESS</option>
                            <option value="PROCESSING" ${row.status==='PROCESSING'?'selected':''}>PROCESSING</option>
                            <option value="APPROVE" ${row.status==='APPROVE'?'selected':''}>APPROVE</option>
                            <option value="DELIVERED" ${row.status==='DELIVERED'?'selected':''}>DELIVERED</option>
                            <option value="REJECT" ${row.status==='REJECT'?'selected':''}>REJECT</option>
                        </select>
                    </td>
                    <td class="px-6 py-4 align-middle text-center">
                        <div class="flex justify-center gap-2">
                            <button onclick='openEditModal(${JSON.stringify(row)})' class="text-blue-500 hover:text-white hover:bg-blue-500 border border-blue-200 p-2 rounded-lg transition shadow-sm" title="Edit">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button onclick="deleteRow(${row.rowIndex})" class="text-red-400 hover:text-white hover:bg-red-500 border border-red-200 p-2 rounded-lg transition shadow-sm" title="Delete">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 3. Status Update
        async function updateStatus(rowIndex, el) {
            const newStatus = el.value;
            el.className = `st-${newStatus.replace(/ /g, '-')} appearance-none py-1.5 px-3 rounded-full shadow-sm outline-none transition-all hover:opacity-90 w-32`;
            const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
            
            await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "update", rowIndex, status: newStatus }) });
            Toast.fire({ icon: 'success', title: 'Status Updated' });
        }

        // 4. Delete
        async function deleteRow(rowIndex) {
            Swal.fire({
                title: 'Delete?', text: "This cannot be undone.", icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'Delete'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.showLoading();
                    await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "delete", rowIndex }) });
                    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Deleted', showConfirmButton: false, timer: 1500 });
                    loadData();
                }
            })
        }

        // 5. Search
        function filterData() {
            const q = document.getElementById('adminSearch').value.toLowerCase();
            const filtered = allData.filter(r => r.name.toLowerCase().includes(q) || r.email.toLowerCase().includes(q) || r.mobile.includes(q));
            renderTable(filtered);
        }

        // 6. EDIT LOGIC (New)
        const modal = document.getElementById('editModal');

        function openEditModal(row) {
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.add('active'), 10);

            // Fill Form
            document.getElementById('editRowIndex').value = row.rowIndex;
            document.getElementById('editName').value = row.name;
            document.getElementById('editBiz').value = row.business;
            document.getElementById('editEmail').value = row.email;
            document.getElementById('editMobile').value = row.mobile;
            document.getElementById('editType').value = row.type;
            document.getElementById('editReq').value = row.req;
            document.getElementById('editDate').value = row.startDate; // Expects yyyy-mm-dd
            document.getElementById('editUrl').value = row.url;
            document.getElementById('editGender').value = row.gender;
        }

        function closeModal() {
            modal.classList.remove('active');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        async function saveEdit(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSave');
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Saving...`;
            btn.disabled = true;

            const payload = {
                action: "edit",
                rowIndex: document.getElementById('editRowIndex').value,
                name: document.getElementById('editName').value,
                business: document.getElementById('editBiz').value,
                email: document.getElementById('editEmail').value,
                mobile: document.getElementById('editMobile').value,
                type: document.getElementById('editType').value,
                req: document.getElementById('editReq').value,
                startDate: document.getElementById('editDate').value,
                url: document.getElementById('editUrl').value,
                gender: document.getElementById('editGender').value
            };

            try {
                await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
                closeModal();
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Changes Saved', showConfirmButton: false, timer: 1500 });
                loadData(); // Refresh table
            } catch(err) {
                Swal.fire("Error", "Failed to save changes", "error");
            } finally {
                btn.innerHTML = "Save Changes";
                btn.disabled = false;
            }
        }

        // Start
        loadData();
    </script>
</body>
</html>
