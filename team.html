<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Team Dashboard</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --primary: #4f46e5; --bg: #f3f4f6; }
    body { font-family: sans-serif; background-color: var(--bg); padding: 20px; }
    
    .admin-card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .team-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #818cf8; }
    
    /* Live Preview */
    #previewImg { 
      width: 100px; height: 100px; border-radius: 50%; object-fit: cover; 
      border: 3px solid var(--primary); display: none; margin: 0 auto 15px auto;
    }

    .separator { display: flex; align-items: center; text-align: center; margin: 15px 0; }
    .separator::before, .separator::after { content: ''; flex: 1; border-bottom: 1px solid #ddd; }
    .separator:not(:empty)::before { margin-right: .25em; }
    .separator:not(:empty)::after { margin-left: .25em; }
  </style>
</head>
<body>

<div class="container">
  <div class="row justify-content-center mb-4">
    <div class="col-md-8">
      <div class="admin-card">
        <h3 class="text-center mb-4">Team Upload Dashboard</h3>
        
        <div class="text-center">
          <img id="previewImg" src="" alt="Preview">
        </div>

        <form id="teamForm">
          <input type="hidden" id="editIndex" value="-1">
          
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" id="name" required placeholder="Full Name">
          </div>
          <div class="row">
            <div class="col-6 mb-3">
              <label class="form-label">Designation</label>
              <input type="text" class="form-control" id="designation" required placeholder="Role">
            </div>
            <div class="col-6 mb-3">
              <label class="form-label">Experience/Email</label>
              <input type="text" class="form-control" id="experience" required placeholder="Email or Experience">
            </div>
          </div>

          <div class="p-3 border rounded bg-light">
            <label class="fw-bold mb-2">Profile Image</label>
            
            <input type="url" class="form-control mb-2" id="imgUrl" 
                   placeholder="Paste Image Link or Google Drive Link" 
                   oninput="handleUrlPreview()">
            
            <div class="separator text-muted">OR</div>
            
            <input type="file" class="form-control" id="imgFile" accept="image/*" 
                   onchange="handleFilePreview()">
            
            <small class="text-muted d-block mt-1">Uploading a file overrides the link above.</small>
          </div>

          <div class="text-center mt-4">
            <button type="submit" class="btn btn-primary" id="submitBtn">Save Data</button>
            <div id="loader" class="spinner-border text-primary spinner-border-sm ms-2" style="display:none"></div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="card p-3 shadow-sm border-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light"><tr><th>Img</th><th>Name</th><th>Designation</th><th>Details</th><th>Actions</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // ********************************************
  // PASTE YOUR NEW WEB APP URL HERE
  // ********************************************
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwECaD2sEpNKK33o2oApC_X4OHKJEf6Ou8eD0BQQ5rsibF4Tgn1hPNFiR1R2pFa1tWY/exec"; 

  window.onload = loadData;

  function loadData() {
    fetch(SCRIPT_URL + "?action=read")
      .then(r => r.json())
      .then(data => {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        data.forEach((row, i) => {
          tbody.innerHTML += `
            <tr>
              <td><img src="${row[3]}" class="team-img" onerror="this.src='https://via.placeholder.com/50'"></td>
              <td><strong>${row[0]}</strong></td>
              <td>${row[1]}</td>
              <td>${row[2]}</td>
              <td>
                <button class="btn btn-sm btn-outline-primary" onclick="editRow(${i}, '${row[0]}', '${row[1]}', '${row[2]}', '${row[3]}')">Edit</button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteRow(${i})">Del</button>
              </td>
            </tr>`;
        });
      });
  }

  document.getElementById('teamForm').addEventListener('submit', function(e) {
    e.preventDefault();
    toggleLoader(true);

    const fileInput = document.getElementById('imgFile');
    const file = fileInput.files[0];
    
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const base64 = e.target.result.split(',')[1]; 
        submitData(base64, file.name, file.type);
      };
      reader.readAsDataURL(file);
    } else {
      submitData("", "", "");
    }
  });

  function submitData(base64Data, fileName, mimeType) {
    const formData = new FormData();
    formData.append('name', document.getElementById('name').value);
    formData.append('designation', document.getElementById('designation').value);
    formData.append('experience', document.getElementById('experience').value);
    formData.append('image', document.getElementById('imgUrl').value);
    
    // File Data
    formData.append('fileData', base64Data);
    formData.append('fileName', fileName);
    formData.append('mimeType', mimeType);

    const editIdx = document.getElementById('editIndex').value;
    formData.append('action', editIdx === "-1" ? 'add' : 'edit');
    if(editIdx !== "-1") formData.append('row', editIdx);

    fetch(SCRIPT_URL, { method: 'POST', body: formData })
      .then(r => r.json())
      .then(() => {
        resetForm();
        loadData();
        toggleLoader(false);
      })
      .catch(e => { alert("Error saving data"); toggleLoader(false); });
  }

  function editRow(index, name, desig, exp, img) {
    document.getElementById('name').value = name;
    document.getElementById('designation').value = desig;
    document.getElementById('experience').value = exp;
    document.getElementById('imgUrl').value = img;
    document.getElementById('editIndex').value = index;
    
    // Show preview immediately
    document.getElementById('previewImg').src = img;
    document.getElementById('previewImg').style.display = 'block';

    document.getElementById('submitBtn').innerText = "Update Member";
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function deleteRow(index) {
    if(confirm("Delete this member?")) {
       const fd = new FormData();
       fd.append('action', 'delete');
       fd.append('row', index);
       fetch(SCRIPT_URL, { method: 'POST', body: fd }).then(() => loadData());
    }
  }

  // --- PREVIEW & FIX LINK LOGIC ---
  function handleUrlPreview() {
    let url = document.getElementById('imgUrl').value;
    const preview = document.getElementById('previewImg');
    
    // Auto-fix Drive links for preview
    if (url.includes("drive.google.com")) {
      const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
      if (match) {
        url = "https://drive.google.com/uc?export=view&id=" + match[1];
      }
    }
    
    if (url) {
      preview.src = url;
      preview.style.display = 'block';
    } else {
      preview.style.display = 'none';
    }
  }

  function handleFilePreview() {
    const file = document.getElementById('imgFile').files[0];
    const preview = document.getElementById('previewImg');
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        preview.src = e.target.result;
        preview.style.display = 'block';
      }
      reader.readAsDataURL(file);
    }
  }

  function resetForm() {
    document.getElementById('teamForm').reset();
    document.getElementById('editIndex').value = "-1";
    document.getElementById('submitBtn').innerText = "Save Data";
    document.getElementById('previewImg').style.display = 'none';
  }

  function toggleLoader(show) {
    document.getElementById('submitBtn').disabled = show;
    document.getElementById('loader').style.display = show ? 'inline-block' : 'none';
  }
</script>

</body>
</html>
