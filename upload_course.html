<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Management | Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap');
    
    :root { 
        --primary: #4f46e5;
        --primary-dark: #4338ca;
        --secondary: #ec4899;
        --bg: #f8fafc;
        --surface: #ffffff;
        --text-main: #1e293b;
        --text-sub: #64748b;
        --danger: #ef4444;
        --success: #10b981;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    
    body { 
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        color: var(--text-main); 
        min-height: 100vh; 
        overflow-x: hidden;
        padding: 40px;
    }

    /* --- LAYOUT CONTAINER --- */
    .container {
        max-width: 1200px;
        margin: 0 auto;
        position: relative;
    }

    /* --- NAVIGATION BAR --- */
    .top-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        padding: 15px 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        margin-bottom: 40px;
        animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        border: 1px solid rgba(255,255,255,0.6);
    }

    .brand {
        font-family: 'Exo 2';
        font-size: 24px;
        font-weight: 700;
        color: var(--primary);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .nav-links {
        display: flex;
        gap: 20px;
    }

    .nav-link {
        text-decoration: none;
        color: var(--text-sub);
        font-weight: 500;
        font-size: 14px;
        padding: 8px 16px;
        border-radius: 10px;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .nav-link:hover, .nav-link.active {
        background: #eef2ff;
        color: var(--primary);
        transform: translateY(-2px);
    }

    /* --- HEADER AREA --- */
    .header-area { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 30px; 
        animation: fadeIn 1s ease 0.2s backwards; 
    }
    .page-title h1 { font-family: 'Exo 2'; font-size: 36px; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px; }
    .page-title p { color: var(--text-sub); font-size: 15px; margin-top: 5px; }

    /* --- BUTTONS --- */
    .btn-primary {
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: white; border: none; padding: 14px 32px; border-radius: 50px;
        font-weight: 600; font-size: 15px; cursor: pointer;
        display: flex; align-items: center; gap: 10px;
        box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        text-decoration: none;
        animation: pulse-glow 2s infinite;
        white-space: nowrap;
    }
    .btn-primary:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 15px 35px rgba(79, 70, 229, 0.4); }
    .btn-primary:active { transform: scale(0.95); }

    /* --- TABLE CARD --- */
    .table-card {
        background: var(--surface); border-radius: 24px; padding: 30px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.04);
        border: 1px solid rgba(255,255,255,0.6);
        overflow-x: auto; /* Enable horizontal scroll */
        animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s backwards;
    }

    table { width: 100%; border-collapse: separate; border-spacing: 0 12px; min-width: 800px; /* Force scroll on small screens */ }
    th { text-align: left; padding: 15px 20px; color: var(--text-sub); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; border-bottom: 2px solid #f1f5f9; }
    
    tbody tr { 
        background: white; transition: all 0.3s ease; 
        box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        opacity: 0; animation: staggerSlide 0.5s ease forwards;
        border-radius: 12px;
    }
    
    tbody tr:hover { 
        transform: scale(1.01) translateY(-2px); 
        box-shadow: 0 10px 25px rgba(0,0,0,0.06); 
        z-index: 10; position: relative; 
    }
    
    td { padding: 18px 20px; vertical-align: middle; color: var(--text-main); font-size: 14px; white-space: nowrap; }
    td:first-child { border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
    td:last-child { border-top-right-radius: 12px; border-bottom-right-radius: 12px; }

    .course-thumb { 
        width: 60px; height: 40px; border-radius: 8px; object-fit: cover; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.1); background: #e2e8f0;
    }
    
    .badge { padding: 5px 12px; border-radius: 30px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-tech { background: #eef2ff; color: var(--primary); border: 1px solid #c7d2fe; }
    .badge-non { background: #fdf2f8; color: var(--secondary); border: 1px solid #fbcfe8; }

    /* Action Buttons */
    .action-btn { 
        width: 38px; height: 38px; border-radius: 12px; border: none; cursor: pointer; 
        display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; 
    }
    .btn-edit { background: #f1f5f9; color: var(--primary); margin-right: 8px; }
    .btn-edit:hover { background: var(--primary); color: white; transform: rotate(10deg); }
    .btn-del { background: #fef2f2; color: var(--danger); }
    .btn-del:hover { background: var(--danger); color: white; transform: rotate(-10deg); }

    /* --- MODAL --- */
    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px);
        display: none; justify-content: center; align-items: center; z-index: 1000;
        opacity: 0; transition: opacity 0.4s ease;
        padding: 20px; /* Padding for mobile */
    }
    .modal-overlay.active { opacity: 1; }

    .modal-box {
        background: white; width: 100%; max-width: 550px; padding: 40px; border-radius: 30px;
        box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.2);
        transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        max-height: 90vh; overflow-y: auto; /* Scrollable on small screens */
    }
    .modal-overlay.active .modal-box { transform: scale(1); }

    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .modal-title { font-family: 'Exo 2'; font-size: 24px; font-weight: 700; color: var(--text-main); }
    .close-modal { background: none; border: none; font-size: 24px; color: var(--text-sub); cursor: pointer; transition: 0.3s; }
    .close-modal:hover { color: var(--danger); transform: rotate(90deg) scale(1.2); }

    /* Form Inputs */
    .input-group { margin-bottom: 20px; }
    .input-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-sub); margin-bottom: 8px; }
    .form-control {
        width: 100%; padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 14px;
        font-size: 14px; transition: 0.3s; outline: none; background: #f8fafc;
    }
    .form-control:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); transform: translateY(-2px); }
    
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    /* --- TOAST NOTIFICATION --- */
    .toast {
        position: fixed; bottom: 30px; right: 30px; background: white;
        padding: 18px 25px; border-radius: 16px; 
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        display: flex; align-items: center; gap: 15px; 
        transform: translateX(150%);
        transition: 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55); 
        z-index: 2000; border-left: 6px solid var(--primary);
        max-width: 90%; /* Responsive toast */
    }
    .toast.show { transform: translateX(0); }
    .toast-icon { font-size: 22px; }
    .toast-msg { font-weight: 600; font-size: 14px; color: var(--text-main); }

    /* --- ANIMATIONS --- */
    @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes staggerSlide { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pulse-glow { 0% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(79, 70, 229, 0); } 100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); } }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Loader */
    .skeleton-loader { display: none; text-align: center; padding: 60px; }
    .spinner { width: 50px; height: 50px; border: 5px solid #e2e8f0; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }

    /* =========================================
       MEDIA QUERIES (RESPONSIVENESS)
       ========================================= */

    @media (max-width: 992px) {
        body { padding: 20px; }
        .page-title h1 { font-size: 28px; }
    }

    @media (max-width: 768px) {
        /* Nav Stack */
        .top-nav { flex-direction: column; gap: 20px; text-align: center; padding: 20px; }
        .nav-links { width: 100%; justify-content: center; flex-wrap: wrap; gap: 10px; }
        
        /* Header Stack */
        .header-area { flex-direction: column; gap: 20px; text-align: center; align-items: stretch; }
        .btn-primary { justify-content: center; width: 100%; }

        /* Modal Stack */
        .grid-2 { grid-template-columns: 1fr; gap: 10px; }
        .modal-box { padding: 25px; margin: 10px; }

        /* Table Card */
        .table-card { padding: 15px; border-radius: 16px; }
        /* Table headers might hide on very small screens, keep scrolling */
    }

    @media (max-width: 480px) {
        .brand { font-size: 20px; }
        .nav-link { font-size: 13px; padding: 6px 12px; }
        .toast { width: 90%; left: 5%; bottom: 20px; justify-content: center; }
        
        .modal-title { font-size: 20px; }
        .close-modal { font-size: 20px; }
    }

  </style>
</head>
<body>

  <div class="container">
    
    <nav class="top-nav">
        <a href="dashboard.html" class="brand">
            <i class="fas fa-layer-group"></i> <span>Gyanbit Admin</span>
        </a>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="#" class="nav-link active"><i class="fas fa-book-open"></i> Courses</a>
            <a href="admin_enrollments.html" class="nav-link"><i class="fas fa-users"></i> Enrollments</a>
        </div>
    </nav>

    <div class="header-area">
      <div class="page-title">
        <h1>Course Management</h1>
        <p>Create, update and remove courses from the student portal.</p>
      </div>
      <button onclick="openModal('create')" class="btn-primary">
        <i class="fas fa-plus"></i> Add New Course
      </button>
    </div>

    <div class="table-card">
      
      <div id="loader" class="skeleton-loader" style="display:block;">
        <div class="spinner"></div>
        <p style="color:#64748b; font-size:15px; font-weight:500;">Syncing with Google Database...</p>
      </div>

      <table id="courseTable" style="display:none;">
        <thead>
          <tr>
            <th>Thumbnail</th>
            <th>Course Title</th>
            <th>Category</th>
            <th>Price</th>
            <th>Duration / Loc</th>
            <th style="text-align:right;">Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          </tbody>
      </table>
    </div>

  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Add Course</h3>
        <button onclick="closeModal()" class="close-modal"><i class="fas fa-times"></i></button>
      </div>
      
      <form id="courseForm">
        <input type="hidden" id="rowId">
        
        <div class="input-group">
          <label class="input-label">Course Title</label>
          <input type="text" id="c_title" class="form-control" placeholder="e.g. Advanced Python Masterclass" required>
        </div>

        <div class="input-group">
          <label class="input-label">Image URL (Banner)</label>
          <input type="url" id="c_image" class="form-control" placeholder="https://..." required>
        </div>

        <div class="grid-2">
          <div class="input-group">
            <label class="input-label">Type</label>
            <select id="c_type" class="form-control">
              <option value="Technical">Technical</option>
              <option value="Non-Technical">Non-Technical</option>
              <option value="Management">Management</option>
            </select>
          </div>
          <div class="input-group">
            <label class="input-label">Price (₹)</label>
            <input type="number" id="c_price" class="form-control" placeholder="1999" required>
          </div>
        </div>

        <div class="grid-2">
          <div class="input-group">
            <label class="input-label">Duration</label>
            <input type="text" id="c_duration" class="form-control" placeholder="8 Weeks" required>
          </div>
          <div class="input-group">
            <label class="input-label">Location</label>
            <select id="c_location" class="form-control">
              <option value="Remote">Remote</option>
              <option value="On-Site">On-Site</option>
            </select>
          </div>
        </div>

        <button type="submit" id="saveBtn" class="btn-primary" style="width:100%; justify-content:center; margin-top:20px;">
          Save Course
        </button>
      </form>
    </div>
  </div>

  <div class="toast" id="toast">
    <i class="fas fa-check-circle toast-icon" style="color:var(--success);"></i>
    <span class="toast-msg" id="toastMsg">Operation Successful</span>
  </div>

  <script>
    // --- IMPORTANT: YOUR SCRIPT URL ---
    const API_URL = "https://script.google.com/macros/s/AKfycbz4Uu7sZUcC3YXGW621zm3KkLgJrUssJXJNJMLReuteWfZ2Q-mtSootJ4jKUwESv1vw/exec";

    // --- ON LOAD ---
    window.onload = function() {
      fetchCourses();
    };

    // --- 1. FETCH DATA ---
    function fetchCourses() {
      const loader = document.getElementById('loader');
      const table = document.getElementById('courseTable');
      const tbody = document.getElementById('tableBody');

      loader.style.display = 'block';
      table.style.display = 'none';
      tbody.innerHTML = '';

      fetch(API_URL)
        .then(res => res.json())
        .then(data => {
          loader.style.display = 'none';
          table.style.display = 'table';
          renderTable(data);
        })
        .catch(err => {
          loader.style.display = 'none';
          showToast("Error loading data. Check connection.", "error");
        });
    }

    // --- 2. RENDER TABLE ---
    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      
      if(!data || data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:40px; color:#94a3b8;">No courses found. Add your first course!</td></tr>`;
        return;
      }

      data.forEach((course, index) => {
        const delay = index * 0.05; // Fast stagger
        const courseSafe = JSON.stringify(course).replace(/"/g, '&quot;');
        const badgeClass = course.type === 'Technical' ? 'badge-tech' : 'badge-non';

        const tr = document.createElement('tr');
        tr.style.animationDelay = `${delay}s`;
        tr.innerHTML = `
          <td><img src="${course.image}" class="course-thumb" onerror="this.src='https://placehold.co/60x40?text=Img'"></td>
          <td style="font-weight:600; color:#334155;">${course.title}</td>
          <td><span class="badge ${badgeClass}">${course.type}</span></td>
          <td style="font-weight:700; color:var(--text-main);">₹${course.price}</td>
          <td style="color:#64748b; font-size:13px;"><i class="far fa-clock"></i> ${course.duration} • ${course.location}</td>
          <td style="text-align:right;">
            <button class="action-btn btn-edit" onclick="openModal('edit', ${courseSafe})"><i class="fas fa-pen"></i></button>
            <button class="action-btn btn-del" onclick="deleteCourse(${course.rowId})"><i class="fas fa-trash-alt"></i></button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // --- 3. MODAL LOGIC ---
    const modal = document.getElementById('modalOverlay');
    const form = document.getElementById('courseForm');

    function openModal(mode, data = null) {
      modal.style.display = 'flex';
      setTimeout(() => modal.classList.add('active'), 10);

      if(mode === 'create') {
        document.getElementById('modalTitle').innerText = "Add New Course";
        document.getElementById('rowId').value = "";
        form.reset();
      } else {
        document.getElementById('modalTitle').innerText = "Update Course";
        document.getElementById('rowId').value = data.rowId;
        document.getElementById('c_title').value = data.title;
        document.getElementById('c_image').value = data.image;
        document.getElementById('c_type').value = data.type;
        document.getElementById('c_price').value = data.price;
        document.getElementById('c_duration').value = data.duration;
        document.getElementById('c_location').value = data.location;
      }
    }

    function closeModal() {
      modal.classList.remove('active');
      setTimeout(() => modal.style.display = 'none', 300);
    }

    // --- 4. SAVE (CREATE / EDIT) ---
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('saveBtn');
      const originalText = btn.innerHTML;
      btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Saving...`;
      btn.disabled = true;

      const payload = {
        action: document.getElementById('rowId').value ? 'update' : 'create',
        rowId: document.getElementById('rowId').value,
        title: document.getElementById('c_title').value,
        image: document.getElementById('c_image').value,
        type: document.getElementById('c_type').value,
        price: document.getElementById('c_price').value,
        duration: document.getElementById('c_duration').value,
        location: document.getElementById('c_location').value
      };

      fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(data => {
          if(data.result === 'success') {
            closeModal();
            fetchCourses();
            showToast("Course saved successfully!", "success");
          } else {
            showToast("Error: " + data.message, "error");
          }
        })
        .catch(err => showToast("Network Error", "error"))
        .finally(() => {
          btn.innerHTML = originalText;
          btn.disabled = false;
        });
    });

    // --- 5. DELETE ---
    function deleteCourse(id) {
      if(!confirm("Are you sure you want to delete this course?")) return;

      showToast("Deleting course...", "info");
      
      fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', rowId: id }) })
        .then(res => res.json())
        .then(data => {
          if(data.result === 'success') {
            fetchCourses();
            showToast("Course deleted.", "success");
          } else {
            showToast("Delete failed.", "error");
          }
        });
    }

    // --- UTILS: TOAST ---
    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      const icon = toast.querySelector('.toast-icon');
      const msgSpan = document.getElementById('toastMsg');
      
      msgSpan.innerText = msg;
      
      if(type === 'error') {
        toast.style.borderLeftColor = "#ef4444";
        icon.className = "fas fa-exclamation-circle toast-icon";
        icon.style.color = "#ef4444";
      } else if (type === 'info') {
        toast.style.borderLeftColor = "#3b82f6";
        icon.className = "fas fa-info-circle toast-icon";
        icon.style.color = "#3b82f6";
      } else {
        toast.style.borderLeftColor = "#10b981";
        icon.className = "fas fa-check-circle toast-icon";
        icon.style.color = "#10b981";
      }

      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
