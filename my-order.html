<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #f0f9ff; }
        .status-pill { padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; }
        .st-SUBMIT { background: #bfdbfe; color: #1e40af; }
        .st-IN-PROGRESS { background: #fed7aa; color: #9a3412; }
        .st-PROCESSING { background: #fef08a; color: #854d0e; }
        .st-APPROVE { background: #bbf7d0; color: #166534; }
        .st-DELIVERED { background: #166534; color: white; }
        .st-REJECT { background: #fecaca; color: #991b1b; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-blue-600 p-6 text-center">
            <h1 class="text-2xl font-bold text-white">Track Your Order</h1>
            <p class="text-blue-100 text-sm">Enter registered Mobile or Email</p>
        </div>

        <div class="p-6">
            <form onsubmit="searchOrder(event)" class="space-y-4">
                <input type="text" id="query" required placeholder="Mobile or Email..." 
                    class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <button type="submit" id="btnSearch" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">
                    Check Status
                </button>
            </form>

            <div id="result" class="hidden mt-6 border-t pt-4">
                <div class="text-center mb-4">
                    <span id="badge" class="status-pill st-SUBMIT">--</span>
                </div>
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between"><span class="text-gray-500">Name:</span> <span id="rName" class="font-bold">--</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Business:</span> <span id="rBiz" class="font-bold">--</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Service:</span> <span id="rType" class="font-bold">--</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Date:</span> <span id="rDate" class="font-bold">--</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 🔴 PASTE URL HERE
        const API_URL = "https://script.google.com/macros/s/AKfycbxiShH80aYTO_PZd0yL5yBLKuGWyAWduFv-pS3BSvJdiQ7N4wlIg_3OkSVq3Tlheaq3Fw/exec"; 

        async function searchOrder(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSearch');
            const q = document.getElementById('query').value.toLowerCase();
            const resultDiv = document.getElementById('result');
            
            btn.innerHTML = "Searching...";
            btn.disabled = true;

            try {
                const res = await fetch(API_URL); // Fetch all data
                const data = await res.json();
                
                if(data.error) { throw new Error(data.message); }

                // Filter logic
                const found = data.find(row => 
                    row.mobile.includes(q) || row.email.toLowerCase() === q
                );

                if (found) {
                    resultDiv.classList.remove('hidden');
                    document.getElementById('rName').innerText = found.name;
                    document.getElementById('rBiz').innerText = found.business;
                    document.getElementById('rType').innerText = found.type;
                    document.getElementById('rDate').innerText = found.startDate;
                    
                    const badge = document.getElementById('badge');
                    badge.innerText = found.status;
                    badge.className = `status-pill st-${found.status.replace(/ /g, '-')}`;
                } else {
                    resultDiv.classList.add('hidden');
                    Swal.fire("Not Found", "No order found with these details.", "error");
                }
            } catch (err) {
                Swal.fire("Error", "Failed to fetch data. Check URL or Sheet Name.", "error");
                console.error(err);
            } finally {
                btn.innerHTML = "Check Status";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
