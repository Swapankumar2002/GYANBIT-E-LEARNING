<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | Gyanbit</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #4e54c8;  /* Fallback */
            background: linear-gradient(to left, #8f94fb, #4e54c8); 
            overflow: hidden;
            position: relative;
        }

        /* --- NEW BACKGROUND ANIMATION (Floating Squares) --- */
        .circles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .circles li {
            position: absolute;
            display: block;
            list-style: none;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            animation: animate 25s linear infinite;
            bottom: -150px;
        }

        .circles li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .circles li:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .circles li:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .circles li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .circles li:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .circles li:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
        .circles li:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; }
        .circles li:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
        .circles li:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
        .circles li:nth-child(10){ left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }

        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }
        /* -------------------------------------------------- */

        .auth-container { 
            background: rgba(255, 255, 255, 0.95); /* Slight transparency */
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 420px; 
            text-align: center;
            z-index: 10; 
            position: relative;
            min-height: 550px;
            backdrop-filter: blur(10px); /* Glass effect */
        }

        /* Toggle Switch */
        .toggle-box {
            background: #e2e8f0;
            border-radius: 30px;
            display: flex;
            position: relative;
            margin-bottom: 30px;
            padding: 5px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .toggle-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            z-index: 2;
            color: #64748b;
            font-weight: 600;
            transition: 0.3s;
            font-size: 14px;
        }

        .toggle-btn.active { color: white; }

        #btn-slider {
            position: absolute;
            top: 5px; left: 5px;
            height: calc(100% - 10px);
            width: calc(50% - 5px);
            background: linear-gradient(135deg, #4e54c8, #8f94fb);
            border-radius: 25px;
            transition: 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 1;
        }

        /* Forms Styling */
        .form-box { display: none; animation: fadeIn 0.5s; }
        .form-box.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { 
            color: #333;
            font-size: 26px; 
            font-weight: 700; 
            margin-bottom: 5px; 
        }

        p.subtitle { color: #64748b; font-size: 13px; margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; text-align: left; }
        
        .input-wrapper {
            display: flex; align-items: center;
            background: #f8fafc; border: 1px solid #e2e8f0;
            border-radius: 12px; padding: 5px 15px; transition: 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: #4e54c8; background: white;
            box-shadow: 0 4px 15px rgba(78, 84, 200, 0.15);
        }

        .input-wrapper i { color: #4e54c8; font-size: 16px; margin-right: 12px; width: 20px; text-align: center; }
        
        input { 
            width: 100%; padding: 12px 0; border: none; 
            background: transparent; outline: none; font-size: 14px; color: #334155;
        }

        button { 
            width: 100%; padding: 14px; 
            background: linear-gradient(135deg, #4e54c8, #8f94fb); 
            color: white; border: none; border-radius: 50px; 
            font-size: 15px; font-weight: 600; cursor: pointer; 
            margin-top: 15px; transition: 0.3s; 
            box-shadow: 0 10px 20px rgba(78, 84, 200, 0.3);
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(78, 84, 200, 0.4); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }

        .error { color: #ef4444; font-size: 12px; margin-top: 10px; display: none; background: #fef2f2; padding: 8px; border-radius: 8px; }
    </style>
</head>
<body>

    <ul class="circles">
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li>
    </ul>

    <div class="auth-container">
        <div class="toggle-box">
            <div id="btn-slider"></div>
            <div class="toggle-btn active" onclick="switchForm('login')">Login</div>
            <div class="toggle-btn" onclick="switchForm('register')">Sign Up</div>
        </div>

        <div id="login-form" class="form-box active">
            <h2>Welcome Back</h2>
            <p class="subtitle">Login to access your dashboard</p>
            <form onsubmit="handleAuth(event, 'login')">
                <div class="input-group">
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="Email Address" required>
                    </div>
                </div>
                <div class="input-group">
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-pass" placeholder="Password" required>
                    </div>
                </div>
                <button type="submit" id="login-btn">LOGIN</button>
            </form>
            <p class="error" id="login-error"></p>
        </div>

        <div id="register-form" class="form-box">
            <h2>Create Account</h2>
            <p class="subtitle">Join the innovation hub</p>
            <form onsubmit="handleAuth(event, 'register')">
                <div class="input-group">
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="reg-name" placeholder="Full Name" required>
                    </div>
                </div>
                <div class="input-group">
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="Email Address" required>
                    </div>
                </div>
                <div class="input-group">
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="reg-mobile" placeholder="Mobile Number" required pattern="[0-9]{10}">
                    </div>
                </div>
                <div class="input-group">
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg-pass" placeholder="Create Password" required>
                    </div>
                </div>
                <button type="submit" id="reg-btn">REGISTER</button>
            </form>
            <p class="error" id="reg-error"></p>
        </div>
    </div>

    <script>
        // --- PASTE YOUR GOOGLE SCRIPT URL HERE ---
        const API_URL = "https://script.google.com/macros/s/AKfycbytd5dHjPa3mGrTMCOXmd5dE3a98eeMbZHeo6j48ubOQGWJPLwkob7GLwnoKxMtarLYrA/exec";

        // Toggle Form Logic
        function switchForm(type) {
            const slider = document.getElementById('btn-slider');
            const loginForm = document.getElementById('login-form');
            const regForm = document.getElementById('register-form');
            const btns = document.querySelectorAll('.toggle-btn');

            if (type === 'login') {
                slider.style.left = '5px';
                loginForm.classList.add('active');
                regForm.classList.remove('active');
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                slider.style.left = '50%';
                loginForm.classList.remove('active');
                regForm.classList.add('active');
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
            }
        }

        // Unified Auth Handler
        function handleAuth(e, action) {
            e.preventDefault();
            
            const isLogin = action === 'login';
            const btn = document.getElementById(isLogin ? 'login-btn' : 'reg-btn');
            const errorEl = document.getElementById(isLogin ? 'login-error' : 'reg-error');
            
            // Prepare Data
            let payload = { action: action };
            if (isLogin) {
                payload.email = document.getElementById('login-email').value.trim();
                payload.password = document.getElementById('login-pass').value.trim();
                btn.innerText = "AUTHENTICATING...";
            } else {
                payload.name = document.getElementById('reg-name').value.trim();
                payload.email = document.getElementById('reg-email').value.trim();
                payload.mobile = document.getElementById('reg-mobile').value.trim();
                payload.password = document.getElementById('reg-pass').value.trim();
                btn.innerText = "CREATING ACCOUNT...";
            }

            btn.disabled = true;
            errorEl.style.display = 'none';

            // Send Request (Compatible with your fixed Google Script)
            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    if (isLogin) {
                        localStorage.setItem('gyanbit_user', JSON.stringify(data));
                        localStorage.setItem('gyanbit_role', data.role);
                        btn.innerText = "SUCCESS";
                        btn.style.background = "#10b981";
                        setTimeout(() => window.location.href = "dashboard.html", 1000);
                    } else {
                        btn.innerText = "SUCCESS";
                        btn.style.background = "#10b981";
                        alert("Registration Successful! Please Login.");
                        switchForm('login'); 
                        btn.innerText = "REGISTER"; 
                        btn.disabled = false;
                        btn.style.background = "linear-gradient(135deg, #4e54c8, #8f94fb)";
                    }
                } else {
                    throw new Error(data.message || "Action Failed");
                }
            })
            .catch(err => {
                btn.innerText = isLogin ? "LOGIN" : "REGISTER";
                btn.disabled = false;
                btn.style.background = "linear-gradient(135deg, #4e54c8, #8f94fb)";
                errorEl.innerText = err.message;
                errorEl.style.display = 'block';
            });
        }
    </script>
</body>
</html>
