<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lesson Detail | Routmap Track</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #020617 0%, #0f172a 42%, #111827 100%);
        color: white;
        min-height: 100vh;
      }
      .glass {
        background: rgba(15, 23, 42, 0.72);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255,255,255,0.12);
      }
      .route-arrow {
        animation: routePulse 1.3s ease-in-out infinite;
      }
      @keyframes routePulse {
        0%, 100% { transform: translateX(0); opacity: 0.75; }
        50% { transform: translateX(8px); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
      <a href="ROADMAP.html" class="mb-6 inline-flex items-center rounded-full border border-white/10 bg-white/10 px-4 py-2 text-sm font-semibold transition hover:bg-white/20">
        <i class="fa-solid fa-arrow-left mr-2"></i>Back to days
      </a>
      <div id="lessonDetail" class="space-y-6"></div>
    </div>

    <script>
      const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxMQgUlnWtkSY1EP4c1jqUsAeyOmSkbpzWjGGZY2TY0h3Ih6fuk7TDT_pzDP-kzLIUD/exec';
      const STORAGE_KEYS = { solutions: 'routmap-solutions' };
      const params = new URLSearchParams(window.location.search);
      const day = params.get('day');
      const lessonDetail = document.getElementById('lessonDetail');

      async function loadLesson() {
        if (!day) {
          lessonDetail.innerHTML = '<div class="glass rounded-[2rem] p-8 text-center text-slate-400">No lesson selected.</div>';
          return;
        }

        try {
          const response = await fetch(`${APP_SCRIPT_URL}?action=get-lessons`);
          const payload = await response.json();
          const rows = normalizeRows(payload);
          const lesson = rows.find((item) => String(item.day) === String(day));
          if (!lesson) {
            lessonDetail.innerHTML = '<div class="glass rounded-[2rem] p-8 text-center text-slate-400">This lesson is not available yet.</div>';
            return;
          }
          renderLesson(lesson, rows);
        } catch (error) {
          lessonDetail.innerHTML = '<div class="glass rounded-[2rem] p-8 text-center text-slate-400">Unable to load this lesson right now.</div>';
        }
      }

      function normalizeRows(payload) {
        if (!payload) return [];
        if (Array.isArray(payload)) {
          if (payload.length && typeof payload[0] === 'object' && !Array.isArray(payload[0])) return payload.map((item) => mapRow(item));
          return payload.slice(1).map((row) => mapRow(row));
        }
        if (payload.rows && Array.isArray(payload.rows)) return payload.rows.map((row) => mapRow(row));
        if (payload.data && Array.isArray(payload.data)) return payload.data.map((row) => mapRow(row));
        return [];
      }

      function mapRow(value) {
        if (value && typeof value === 'object' && !Array.isArray(value)) {
          const data = {};
          Object.keys(value).forEach((key) => {
            const normalizedKey = String(key).trim().toLowerCase();
            if (normalizedKey === 'day') data.day = value[key];
            else if (normalizedKey === 'title') data.title = value[key];
            else if (normalizedKey === 'description') data.description = value[key];
            else if (normalizedKey === 'youtube') data.youtube = value[key];
            else if (normalizedKey === 'image') data.image = value[key];
            else if (normalizedKey === 'resource') data.resource = value[key];
            else if (normalizedKey === 'codingtask') data.codingTask = value[key];
            else if (normalizedKey === 'remarks') data.remarks = value[key];
          });
          return {
            day: data.day || '',
            title: data.title || 'Untitled Lesson',
            description: data.description || 'A promising lesson awaits.',
            youtube: data.youtube || '',
            image: data.image || '',
            resource: data.resource || '',
            codingTask: data.codingTask || '',
            remarks: data.remarks || '',
          };
        }
        if (Array.isArray(value)) {
          return {
            day: value[0] || '',
            title: value[1] || 'Untitled Lesson',
            description: value[2] || 'A promising lesson awaits.',
            youtube: value[3] || '',
            image: value[4] || '',
            resource: value[5] || '',
            codingTask: value[6] || '',
            remarks: value[7] || '',
          };
        }
        return { day: '', title: 'Untitled Lesson', description: 'A promising lesson awaits.', youtube: '', image: '', resource: '', codingTask: '', remarks: '' };
      }

      function renderLesson(item, allLessons) {
        const videoUrl = getYouTubeEmbedUrl(item.youtube);
        const remarks = parseRemarks(item.remarks);
        const solution = getSolution(item.day);
        const sortedLessons = [...(allLessons || [])].sort((a, b) => Number(a.day || 0) - Number(b.day || 0));
        const currentIndex = sortedLessons.findIndex((lesson) => String(lesson.day) === String(item.day));
        const previousLesson = currentIndex > 0 ? sortedLessons[currentIndex - 1] : null;
        const nextLesson = currentIndex >= 0 && currentIndex < sortedLessons.length - 1 ? sortedLessons[currentIndex + 1] : null;
        const hasTask = Boolean(item.codingTask && String(item.codingTask).trim());

        lessonDetail.innerHTML = `
          <div class="glass overflow-hidden rounded-[2rem]">
            <div class="grid gap-6 p-6 sm:p-8 lg:grid-cols-[1.1fr_0.45fr]">
              <div>
                <div class="mb-4 inline-flex items-center rounded-full border border-cyan-400/30 bg-cyan-400/10 px-3 py-1 text-sm font-semibold text-cyan-300">Day ${escapeHtml(item.day)}</div>
                <h1 class="text-3xl font-semibold text-white">${escapeHtml(item.title)}</h1>
                <p class="mt-4 text-lg leading-8 text-slate-300">${escapeHtml(item.description)}</p>
                <div class="mt-6 flex flex-wrap gap-3">
                  ${videoUrl ? `<a href="${item.youtube}" target="_blank" rel="noreferrer" class="rounded-full bg-rose-500/10 px-4 py-2 text-sm font-semibold text-rose-300"><i class="fa-brands fa-youtube mr-2"></i>Watch video</a>` : ''}
                  ${item.resource ? `<a href="${item.resource}" target="_blank" rel="noreferrer" class="rounded-full bg-cyan-500/10 px-4 py-2 text-sm font-semibold text-cyan-300"><i class="fa-solid fa-link mr-2"></i>Open resource</a>` : ''}
                </div>
                ${videoUrl ? `<div class="mt-6 overflow-hidden rounded-2xl border border-white/10"><iframe class="aspect-video w-full" src="${videoUrl}" title="${escapeHtml(item.title)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>` : ''}
                ${item.image ? `<div class="mt-6 overflow-hidden rounded-2xl border border-white/10 bg-slate-950/70 p-3"><img src="${item.image}" alt="${escapeHtml(item.title)}" class="max-h-[420px] w-full rounded-xl object-contain" /></div>` : ''}
                <div class="mt-6 rounded-2xl border border-cyan-400/20 bg-slate-900/70 p-5">
                  <p class="text-sm text-cyan-300">${hasTask ? 'Coding challenge' : 'Your work space'}</p>
                  ${hasTask ? `<h3 class="mt-2 text-xl font-semibold text-white">${escapeHtml(item.codingTask)}</h3>` : ''}
                  <p class="mt-3 text-sm leading-7 text-slate-300">Write your notes or code, then submit your Google Colab link so the admin can review your progress.</p>
                  <textarea class="codeEditor mt-4 min-h-[180px] w-full rounded-2xl border border-white/10 bg-slate-950/80 px-4 py-3 font-mono text-sm text-slate-100 outline-none focus:border-cyan-400" data-day="${item.day}">${escapeHtml(solution)}</textarea>
                  <div class="mt-4 flex flex-wrap gap-2">
                    <button class="copyBtn rounded-full border border-white/10 bg-white/10 px-3 py-2 text-sm font-semibold" data-day="${item.day}"><i class="fa-solid fa-copy mr-2"></i>Copy</button>
                    <button class="resetBtn rounded-full border border-white/10 bg-white/10 px-3 py-2 text-sm font-semibold" data-day="${item.day}"><i class="fa-solid fa-rotate-left mr-2"></i>Reset</button>
                  </div>
                  <form class="submissionForm mt-4 space-y-3" data-day="${escapeHtml(item.day)}">
                    <input name="name" class="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-4 py-3 text-sm outline-none focus:border-cyan-400" placeholder="Your name" required />
                    <input name="colabLink" class="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-4 py-3 text-sm outline-none focus:border-cyan-400" placeholder="Google Colab link" required />
                    <button type="submit" class="rounded-full bg-gradient-to-r from-cyan-500 to-indigo-500 px-4 py-2 text-sm font-semibold text-white">SUBMIT</button>
                  </form>
                  <div class="submissionStatus mt-3 text-sm text-slate-400"></div>
                </div>
                ${remarks.length ? `
                  <div class="mt-6 space-y-3">
                    ${remarks.map((note) => `
                      <div class="rounded-2xl border border-amber-400/20 bg-amber-500/10 p-4 text-sm text-amber-100">
                        <div class="mb-2 flex items-center gap-2 font-semibold"><i class="fa-solid fa-sticky-note"></i>${note.label}</div>
                        <p>${escapeHtml(note.content)}</p>
                      </div>`).join('')}
                  </div>` : ''}
              </div>
              <div class="space-y-4">
                <div class="rounded-[1.5rem] border border-cyan-400/20 bg-cyan-500/10 p-5">
                  <p class="text-sm text-cyan-300">Learning route</p>
                  <h3 class="mt-2 text-xl font-semibold text-white">Follow the path</h3>
                  <div class="mt-4 space-y-3">
                    ${previousLesson ? `<a href="lesson.html?day=${previousLesson.day}" class="flex items-center gap-2 rounded-2xl border border-white/10 bg-white/5 px-3 py-3 text-sm text-slate-200 transition hover:bg-white/10"><i class="fa-solid fa-arrow-left text-cyan-300"></i> Previous: Day ${escapeHtml(previousLesson.day)} · ${escapeHtml(previousLesson.title)}</a>` : '<div class="rounded-2xl border border-dashed border-white/10 px-3 py-3 text-sm text-slate-400">You are at the start of the learning path.</div>'}
                    <div class="rounded-2xl border border-cyan-400/20 bg-slate-950/70 p-3">
                      <div class="flex items-center justify-between text-sm font-semibold text-white"><span>Current lesson</span><i class="route-arrow fa-solid fa-arrow-right text-cyan-300"></i></div>
                      <div class="mt-3 rounded-xl border border-cyan-400/20 bg-cyan-500/10 px-3 py-3 text-sm text-slate-200">Day ${escapeHtml(item.day)} · ${escapeHtml(item.title)}</div>
                    </div>
                    ${nextLesson ? `<a href="lesson.html?day=${nextLesson.day}" class="flex items-center justify-between rounded-2xl border border-cyan-400/20 bg-gradient-to-r from-cyan-500/10 to-indigo-500/10 px-3 py-3 text-sm text-slate-200 transition hover:from-cyan-500/20 hover:to-indigo-500/20"><span><i class="fa-solid fa-arrow-right text-cyan-300 mr-2"></i>Next: Day ${escapeHtml(nextLesson.day)} · ${escapeHtml(nextLesson.title)}</span><i class="route-arrow fa-solid fa-arrow-right"></i></a>` : '<div class="rounded-2xl border border-dashed border-white/10 px-3 py-3 text-sm text-slate-400">You have reached the end of this roadmap.</div>'}
                  </div>
                </div>
                <div class="rounded-[1.5rem] border border-white/10 bg-slate-900/70 p-5">
                  <p class="text-sm text-cyan-300">Stay on track</p>
                  <p class="mt-3 text-sm leading-7 text-slate-300">Use this lesson page to review the material, save your notes, and send your Colab work to the admin.</p>
                </div>
              </div>
            </div>
          </div>`;

        document.querySelectorAll('.copyBtn').forEach((button) => button.addEventListener('click', () => copyCode(button.dataset.day)));
        document.querySelectorAll('.resetBtn').forEach((button) => button.addEventListener('click', () => resetCode(button.dataset.day)));
        document.querySelectorAll('.codeEditor').forEach((textarea) => {
          textarea.addEventListener('input', (event) => storeSolution(event.target.dataset.day, event.target.value));
        });
        document.querySelectorAll('.submissionForm').forEach((form) => {
          form.addEventListener('submit', (event) => {
            event.preventDefault();
            const statusBox = form.parentElement.querySelector('.submissionStatus');
            const payload = {
              action: 'add-submission',
              payload: {
                day: form.dataset.day,
                lessonTitle: item.title,
                name: form.querySelector('input[name="name"]').value.trim(),
                colabLink: form.querySelector('input[name="colabLink"]').value.trim(),
              },
            };
            statusBox.textContent = 'Sending...';
            statusBox.className = 'submissionStatus mt-3 text-sm text-cyan-300';
            fetch(APP_SCRIPT_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
              mode: 'no-cors',
            })
              .then(() => {
                statusBox.textContent = 'Submitted. The admin can now review your Colab link.';
                statusBox.className = 'submissionStatus mt-3 text-sm text-emerald-300';
                form.reset();
              })
              .catch(() => {
                statusBox.textContent = 'Could not send the submission right now.';
                statusBox.className = 'submissionStatus mt-3 text-sm text-rose-300';
              });
          });
        });
      }

      function getSolution(day) {
        const solutions = JSON.parse(localStorage.getItem(STORAGE_KEYS.solutions) || '{}');
        return solutions[day] || '';
      }

      function storeSolution(day, value) {
        const solutions = JSON.parse(localStorage.getItem(STORAGE_KEYS.solutions) || '{}');
        solutions[day] = value;
        localStorage.setItem(STORAGE_KEYS.solutions, JSON.stringify(solutions));
      }

      function copyCode(day) {
        const textarea = document.querySelector(`.codeEditor[data-day="${day}"]`);
        if (!textarea) return;
        navigator.clipboard.writeText(textarea.value);
      }

      function resetCode(day) {
        const textarea = document.querySelector(`.codeEditor[data-day="${day}"]`);
        if (!textarea) return;
        textarea.value = '';
        storeSolution(day, '');
      }

      function parseRemarks(text) {
        if (!text) return [];
        return String(text).split(/\|\s*|\n/).map((entry) => entry.trim()).filter(Boolean).map((entry) => ({
          label: entry.toLowerCase().includes('warning') ? 'Warning' : entry.toLowerCase().includes('tip') ? 'Tip' : 'Admin note',
          content: entry,
        }));
      }

      function getYouTubeEmbedUrl(value) {
        if (!value) return '';
        const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]{11})/;
        const match = value.match(regex);
        if (!match) return '';
        return `https://www.youtube.com/embed/${match[1]}`;
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      loadLesson();
    </script>
  </body>
</html>
