<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Help Desk | Gyanbit Pvt. Ltd.</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');
    
    body { 
      font-family: 'Poppins', sans-serif; 
      background: #f8fafc; 
      min-height: 100vh; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      padding: 40px 20px;
      background-image: radial-gradient(#e0e7ff 1px, transparent 1px);
      background-size: 25px 25px;
    }

    .contact-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      width: 100%;
      max-width: 800px; /* Wider for better spacing */
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      border: 1px solid white;
      animation: slideUp 0.6s ease-out;
    }

    .header { text-align: center; margin-bottom: 30px; }
    .header h2 { color: #1e293b; font-size: 28px; font-weight: 700; margin-bottom: 5px; }
    .header p { color: #64748b; font-size: 14px; }

    /* SECTIONS */
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #6366f1;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
      margin-top: 10px;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 5px;
    }

    /* GRID LAYOUT - The Fix for Overlap */
    .grid-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); /* Auto stack on mobile */
        gap: 20px;
        margin-bottom: 20px;
    }

    .form-group label { display: block; font-size: 13px; font-weight: 500; color: #475569; margin-bottom: 8px; }
    
    .input-wrapper { position: relative; }
    .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #163868; }
    
    input, select, textarea {
        width: 85%;
        padding: 12px 15px 12px 40px;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        font-family: inherit;
        font-size: 14px;
        background: #f8fafc;
        transition: 0.3s;
    }
    input:focus, select:focus, textarea:focus { border-color: #6366f1; background: white; outline: none; }
    textarea { padding-left: 15px; min-height: 100px; resize: vertical; }

    .submit-btn {
        width: 90%;
        padding: 15px;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 20px;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
    .submit-btn:disabled { opacity: 0.7; cursor: wait; }

    .back-link { display: block; text-align: center; margin-top: 20px; color: #64748b; text-decoration: none; font-size: 14px; }
    .back-link:hover { color: #6366f1; }

    /* TOAST */
    #toast { visibility: hidden; min-width: 250px; background: #333; color: #fff; text-align: center; border-radius: 50px; padding: 16px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; }
    #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
    @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
  </style>
</head>
<body>

  <div class="contact-card">
    <div class="header">
      <h2>Support Ticket</h2>
      <p>Fill in the details below.</p>
    </div>

    <form id="contactForm" onsubmit="submitContact(event)">
      
      <div class="section-title">Personal Info</div>
      <div class="grid-row">
        <div class="form-group">
          <label>Full Name</label>
          <div class="input-wrapper"><i class="fas fa-user"></i><input type="text" name="name" required placeholder="John Doe"></div>
        </div>
        <div class="form-group">
          <label>Gender</label>
          <div class="input-wrapper"><i class="fas fa-venus-mars"></i>
            <select name="gender" required>
              <option value="">Select</option><option>Male</option><option>Female</option><option>Other</option>
            </select>
          </div>
        </div>
      </div>

      <div class="grid-row">
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" name="email" required placeholder="email@example.com"></div>
        </div>
        <div class="form-group">
          <label>Mobile Number</label>
          <div class="input-wrapper"><i class="fas fa-phone"></i><input type="tel" name="mobile" required placeholder="+91 9876543210"></div>
        </div>
      </div>

      <div class="section-title">Location</div>
      <div class="grid-row" style="grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));">
        <div class="form-group">
          <label>Country</label>
          <div class="input-wrapper"><i class="fas fa-globe"></i><input type="text" name="country" required placeholder="India"></div>
        </div>
        <div class="form-group">
          <label>State</label>
          <div class="input-wrapper"><i class="fas fa-map-marker-alt"></i><input type="text" name="state" required placeholder="State"></div>
        </div>
        <div class="form-group">
          <label>PinCode</label>
          <div class="input-wrapper"><i class="fas fa-thumbtack"></i><input type="text" name="pincode" required placeholder="000000"></div>
        </div>
      </div>

      <div class="section-title">Your Query</div>
      <div class="form-group">
        <label>Subject</label>
        <div class="input-wrapper"><i class="fas fa-tag"></i><input type="text" name="subject" required placeholder="Brief summary"></div>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea name="message" required placeholder="Describe your issue..."></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Submit Ticket</button>
    </form>

    <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
  </div>

  <div id="toast"></div>

  <script>
    // ****************************
    // SCRIPT URL
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyepLTQR48T9rhkGC2103k91ArDTM_x24wv464DPggKNRsazN7OJIif4_pAk4a5aOl8dA/exec';
    // ****************************

    function submitContact(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const original = btn.innerHTML;
      btn.innerHTML = 'Sending...'; btn.disabled = true;

      const form = document.getElementById('contactForm');
      const data = Object.fromEntries(new FormData(form).entries());
      data.action = 'submit_contact';

      fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) })
      .then(res => res.json())
      .then(res => {
        btn.innerHTML = original; btn.disabled = false;
        if(res.status === 'success') { showToast("Ticket Raised!"); form.reset(); }
        else showToast("Error: " + res.message);
      })
      .catch(() => { btn.innerHTML = original; btn.disabled = false; showToast("Connection Failed"); });
    }

    function showToast(msg) {
        let x = document.getElementById("toast");
        x.className = "show"; x.innerText = msg;
        setTimeout(() => x.className = x.className.replace("show", ""), 3000);
    }
  </script>

</body>
</html>
